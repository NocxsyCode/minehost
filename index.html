<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MineHost | Bakımdayız</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-color: #5865F2;
            --secondary-color: #2c2f33;
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Gradients */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(88, 101, 242, 0.1) 0%, transparent 50%),
                        radial-gradient(circle, rgba(56, 189, 248, 0.05) 0%, transparent 40%);
            animation: rotate 20s linear infinite;
            z-index: -1;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 800px;
            width: 90%;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-out;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 10px rgba(88, 101, 242, 0.3));
        }

        .links {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
        }

        .link-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 55px;
            height: 55px;
            background: rgba(88, 101, 242, 0.1);
            color: var(--text-color);
            border: 1px solid rgba(88, 101, 242, 0.3);
            border-radius: 9999px;
            text-decoration: none;
            font-size: 1.4rem;
            transition: all 0.3s ease;
        }

        .link-button:hover {
            background: var(--primary-color);
            border-color: var(--primary-color);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(88, 101, 242, 0.3);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 2rem;
            line-height: 1.6;
        }



        .badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(88, 101, 242, 0.1);
            color: var(--primary-color);
            border-radius: 9999px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 1rem;
            border: 1px solid rgba(88, 101, 242, 0.2);
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #475569;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }
            .logo {
                width: 140px;
                height: 140px;
            }
            .link-button {
                width: 48px;
                height: 48px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://cdn.discordapp.com/attachments/1513987789316817156/1514286626002436218/image.png?ex=6a2ad0d1&is=6a297f51&hm=1f8e69a45c4ba4512a3e836a9b20b0a9d06a2667b8ee8eab29e5d8a9a084bb45&" alt="MineHost Logo" class="logo">
        <div class="badge">Sistem Güncellemesi</div>
        <h1>Şu Anda Bakımdayız</h1>
        <p>Sizlere daha iyi bir deneyim sunabilmek için altyapımızı yeniliyoruz. <br> Çok yakında yeniden aranızda olacağız!</p>
        
        <div class="links">
            <a href="https://discord.gg/vaUz3uHjyd" class="link-button" target="_blank"><i class="fab fa-discord"></i></a>
            <a href="https://twitter.com/minehost" class="link-button" target="_blank"><i class="fab fa-twitter"></i></a>
            <a href="https://instagram.com/minehost" class="link-button" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://minehostum.com" class="link-button" target="_blank"><i class="fas fa-home"></i></a>
        </div>

        <div class="footer">
            &copy; 2026 MineHost Hosting Hizmetleri. Tüm hakları saklıdır.
        </div>
    </div>

    <script>
        // F12 ve tüm dev tools kısayollarını engelle
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) ||
                (e.ctrlKey && e.key === 'U') ||
                (e.ctrlKey && e.key === 'S') ||
                e.keyCode === 123) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }
        });

        // Sağ tık engelle
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        });

        // DevTools'u çok etkili şekilde engelle
        let devToolsOpened = false;
        const threshold = 160;
        
        const checkDevTools = function() {
            const widthThreshold = window.outerWidth - window.innerWidth > threshold;
            const heightThreshold = window.outerHeight - window.innerHeight > threshold;
            
            if (widthThreshold || heightThreshold) {
                if (!devToolsOpened) {
                    devToolsOpened = true;
                    window.location.href = 'about:blank';
                }
            }
        };
        
        setInterval(checkDevTools, 500);
        
        // Konsol izleme
        const startTime = new Date();
        debugger;
        const endTime = new Date();
        if (endTime - startTime > 100) {
            window.location.href = 'about:blank';
        }
    </script>

</body>
</html>
